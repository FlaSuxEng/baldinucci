<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" fill="none">
  <defs>
    <linearGradient id="mapbg" x1="0" y1="0" x2="0" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F9F2E8"/>
      <stop offset="1" stop-color="#EFE4D3"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="820" rx="32" fill="url(#mapbg)"/>

  <!-- strade secondarie -->
  <line x1="100" y1="160" x2="1100" y2="160" stroke="#E2D5C0" stroke-width="6"/>
  <line x1="100" y1="340" x2="1100" y2="340" stroke="#E2D5C0" stroke-width="6"/>
  <line x1="100" y1="520" x2="1100" y2="520" stroke="#E2D5C0" stroke-width="6"/>
  <line x1="280" y1="80" x2="280" y2="740" stroke="#E2D5C0" stroke-width="6"/>
  <line x1="560" y1="80" x2="560" y2="740" stroke="#E2D5C0" stroke-width="6"/>
  <line x1="860" y1="80" x2="860" y2="740" stroke="#E2D5C0" stroke-width="6"/>

  <!-- Tramvia T1 — linea principale in arancione -->
  <!-- percorso: Careggi(in alto) → Morgagni → Baldinucci → Novoli → Centro → Scandicci(fuori mappa a sinistra) -->
  <path d="M760 110 Q760 200 660 260 Q560 320 420 340 Q300 340 220 380 Q140 420 100 480"
        stroke="#E85D04" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- label T1 sulla linea -->
  <rect x="580" y="286" width="68" height="30" rx="15" fill="#E85D04"/>
  <text x="614" y="307" fill="#ffffff" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="800" text-anchor="middle">T1</text>
  <!-- frecce direzionali T1 -->
  <text x="450" y="332" fill="#E85D04" font-family="Arial,Helvetica,sans-serif" font-size="22">→</text>
  <text x="680" y="248" fill="#E85D04" font-family="Arial,Helvetica,sans-serif" font-size="22">→</text>

  <!-- Bus linee tratteggio -->
  <path d="M420 340 Q420 440 460 520 Q500 600 560 680"
        stroke="#1D6FA4" stroke-width="8" stroke-dasharray="18 12" stroke-linecap="round" fill="none"/>
  <path d="M420 340 Q380 440 320 520 Q260 600 220 680"
        stroke="#388E3C" stroke-width="8" stroke-dasharray="18 12" stroke-linecap="round" fill="none"/>

  <!-- ===== PIAZZA BALDINUCCI (home) ===== -->
  <path d="M420 320 C438 320 452 334 452 352 C452 381 420 416 420 416 C420 416 388 381 388 352 C388 334 402 320 420 320Z"
        fill="#C6283B"/>
  <circle cx="420" cy="352" r="13" fill="#ffffff"/>
  <!-- stelle -->
  <text x="407" y="357" fill="#C6283B" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="900">★</text>
  <!-- label home -->
  <rect x="454" y="324" width="298" height="72" rx="16" fill="#C6283B"/>
  <text x="474" y="350" fill="#ffffff" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="800">Piazza Baldinucci</text>
  <text x="474" y="376" fill="rgba(255,255,255,0.9)" font-family="Arial,Helvetica,sans-serif" font-size="17">Punto di partenza</text>

  <!-- ===== POLO NOVOLI ===== -->
  <circle cx="780" cy="340" r="20" fill="#7A263D"/>
  <rect x="814" y="310" width="330" height="80" rx="16" fill="#7A263D"/>
  <text x="836" y="337" fill="#ffffff" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="800">Polo di Novoli</text>
  <text x="836" y="361" fill="rgba(255,255,255,0.9)" font-family="Arial,Helvetica,sans-serif" font-size="16">Economia · Giurisprudenza</text>
  <!-- tempo T1 -->
  <rect x="836" y="377" width="180" height="24" rx="12" fill="rgba(255,255,255,0.2)"/>
  <text x="846" y="394" fill="#ffffff" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="700">🚊 T1 · ~12 min</text>

  <!-- ===== CAREGGI / MORGAGNI ===== -->
  <circle cx="760" cy="130" r="20" fill="#6F3652"/>
  <rect x="796" y="98" width="360" height="90" rx="16" fill="#6F3652"/>
  <text x="818" y="124" fill="#ffffff" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="800">Careggi / Morgagni</text>
  <text x="818" y="148" fill="rgba(255,255,255,0.9)" font-family="Arial,Helvetica,sans-serif" font-size="16">Medicina · Farmacia · Scienze</text>
  <rect x="818" y="165" width="210" height="24" rx="12" fill="rgba(255,255,255,0.2)"/>
  <text x="828" y="182" fill="#ffffff" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="700">🚊 T1 · ~20 min</text>

  <!-- ===== CENTRO STORICO ===== -->
  <circle cx="220" cy="500" r="20" fill="#C98055"/>
  <rect x="90" y="540" width="340" height="90" rx="16" fill="#C98055"/>
  <text x="112" y="566" fill="#ffffff" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="800">Centro Storico</text>
  <text x="112" y="590" fill="rgba(255,255,255,0.9)" font-family="Arial,Helvetica,sans-serif" font-size="16">Lettere · Architettura · Arte</text>
  <rect x="112" y="607" width="236" height="24" rx="12" fill="rgba(255,255,255,0.2)"/>
  <text x="122" y="624" fill="#ffffff" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="700">🚊 T1 · ~25 min</text>

  <!-- ===== SANTA MARTA (Ingegneria) ===== -->
  <circle cx="560" cy="680" r="20" fill="#8A5A36"/>
  <rect x="596" y="650" width="300" height="90" rx="16" fill="#8A5A36"/>
  <text x="616" y="676" fill="#ffffff" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="800">Santa Marta</text>
  <text x="616" y="700" fill="rgba(255,255,255,0.9)" font-family="Arial,Helvetica,sans-serif" font-size="16">Ingegneria · Laboratori</text>
  <rect x="616" y="717" width="238" height="24" rx="12" fill="rgba(255,255,255,0.2)"/>
  <text x="626" y="734" fill="#ffffff" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="700">🚌 Bus · ~30 min</text>

  <!-- ===== CASCINE (Agraria) ===== -->
  <circle cx="220" cy="680" r="20" fill="#447A5B"/>
  <rect x="90" y="718" width="258" height="70" rx="16" fill="#447A5B"/>
  <text x="110" y="744" fill="#ffffff" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="800">Cascine</text>
  <text x="110" y="768" fill="rgba(255,255,255,0.9)" font-family="Arial,Helvetica,sans-serif" font-size="16">Agraria</text>
  <!-- sotto label -->
  <rect x="258" y="718" width="210" height="30" rx="15" fill="#447A5B" opacity="0.9"/>
  <text x="268" y="738" fill="#ffffff" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="700">🚌 Bus/bici · ~20 min</text>

  <!-- ===== LEGENDA ===== -->
  <rect x="820" y="480" width="350" height="270" rx="20" fill="#ffffff" opacity="0.92"/>
  <text x="850" y="518" fill="#231f1b" font-family="Arial,Helvetica,sans-serif" font-size="20" font-weight="800">Come spostarsi</text>

  <!-- T1 -->
  <rect x="850" y="536" width="44" height="18" rx="9" fill="#E85D04"/>
  <text x="862" y="550" fill="#ffffff" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="800">T1</text>
  <text x="906" y="550" fill="#5f5a54" font-family="Arial,Helvetica,sans-serif" font-size="16">Tramvia T1 (fermata vicina)</text>

  <!-- bus -->
  <line x1="850" y1="576" x2="894" y2="576" stroke="#1D6FA4" stroke-width="6" stroke-dasharray="10 6"/>
  <text x="906" y="582" fill="#5f5a54" font-family="Arial,Helvetica,sans-serif" font-size="16">Bus urbano</text>

  <!-- bici -->
  <line x1="850" y1="608" x2="894" y2="608" stroke="#388E3C" stroke-width="6" stroke-dasharray="10 6"/>
  <text x="906" y="614" fill="#5f5a54" font-family="Arial,Helvetica,sans-serif" font-size="16">Bus / bicicletta</text>

  <!-- note -->
  <text x="850" y="650" fill="#7A263D" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="800">Tempi da Piazza Baldinucci</text>
  <text x="850" y="672" fill="#5f5a54" font-family="Arial,Helvetica,sans-serif" font-size="14">Novoli: ~12 min   T1</text>
  <text x="850" y="693" fill="#5f5a54" font-family="Arial,Helvetica,sans-serif" font-size="14">Careggi: ~20 min  T1</text>
  <text x="850" y="714" fill="#5f5a54" font-family="Arial,Helvetica,sans-serif" font-size="14">Centro storico: ~25 min  T1</text>
  <text x="850" y="735" fill="#5f5a54" font-family="Arial,Helvetica,sans-serif" font-size="14">Ingegneria: ~30 min  bus</text>

  <!-- titolo pagina -->
  <text x="90" y="52" fill="#7A263D" font-family="Arial,Helvetica,sans-serif" font-size="30" font-weight="800">Poli universitari UniFI · Firenze</text>
  <text x="90" y="84" fill="#6D5D50" font-family="Arial,Helvetica,sans-serif" font-size="18">Clicca per aprire Piazza Baldinucci su Google Maps</text>
</svg>
